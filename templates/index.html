{% extends "base.html" %}

{% block title %}Home — MoodLens{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📓 New Entry</h1>
</div>

<div class="grid grid-2">
    <div class="card" style="grid-column: 1 / -1; max-width: 680px;">
        <div class="card-header">
            <h3>How are you feeling today?</h3>
            <span class="card-badge">Daily Log</span>
        </div>

        <form action="/log" method="POST">
            <div class="form-group">
                <label>Mood Score (1–10)</label>
                <input type="number" name="mood" class="form-control" min="1" max="10" placeholder="Rate your mood"
                    required>
            </div>

            <div class="form-group">
                <label>Journal Entry</label>
                <textarea name="journal" class="form-control" rows="4"
                    placeholder="Write about your day, thoughts, and feelings..." required></textarea>
            </div>

            <div class="grid grid-3">
                <div class="form-group">
                    <label>Sleep Hours</label>
                    <input type="number" name="sleep" class="form-control" step="0.1" placeholder="e.g. 7.5" required>
                </div>
                <div class="form-group">
                    <label>Activity Level (1–5)</label>
                    <input type="number" name="activity" class="form-control" min="1" max="5" placeholder="1-5"
                        required>
                </div>
                <div class="form-group">
                    <label>Social Interactions</label>
                    <input type="number" name="social" class="form-control" placeholder="e.g. 3" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                ✨ Save Entry
            </button>
        </form>
    </div>
</div>
{% endblock %}

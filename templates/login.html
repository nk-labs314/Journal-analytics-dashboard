<!DOCTYPE html>
<html>
<head>
    <title>{% if mode == "register" %}Register{% else %}Login{% endif %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div style="padding:10px; background:#d4edda; color:#155724; margin-bottom:15px;">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <h1>{% if mode == "register" %}Create Account{% else %}Login{% endif %}</h1>

    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">{% if mode == "register" %}Register{% else %}Login{% endif %}</button>
    </form>

    <p style="margin-top:15px;">
        {% if mode == "register" %}
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        {% else %}
            No account yet? <a href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </p>
</body>
</html>
